<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Hello Page</title>
    <style>
        header {
            background-color: #3c0a50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
        }

        main {
            padding: 30px;
            text-align: center;
        }

        .login-box {
            background-color: white;
            max-width: 400px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .login-box input[type="text"],
        .login-box input[type="password"] {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .login-box button {
            padding: 10px 20px;
            background-color: #3c0a50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-box button:hover {
            background-color: #571c70;
        }

        .message {
            color: red;
        }
    </style>
</head>
<body>

    <header>
        <h1><u>Vote/Opinion Pool & Live Graph</u></h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <h2>WELCOME TO POLL/VOTING</h2>
        <p>HERE! You can give your opinions and generate live graph.</p>

        <!-- ✅ Login Form -->
        <div class="login-box">
            <h3>Login</h3>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Enter username" required>
                <input type="password" id="password" placeholder="Enter password" required>
                <br>
                <button type="submit">Login</button>
            </form>
            <p class="message" id="errorMessage"></p>
        </div>
    </main>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault(); // prevent normal form submission

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorMessage = document.getElementById("errorMessage");

            if (username === "admin" && password === "1234") {
                // Redirect to welcome page
                window.location.href = "welcome.html";
            } else {
                errorMessage.textContent = "❌ Invalid username or password!";
            }
        });
    </script>

</body>
</html>
